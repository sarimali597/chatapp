services:
  - type: web
    name: chatapp-backend
    runtime: node
    rootDir: chatapp/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Update this once you know your frontend's real Render URL
      # (see the deployment steps in README.md).
      - key: CLIENT_URL
        value: https://chatapp-frontend.onrender.com

  - type: web
    name: chatapp-frontend
    runtime: static
    rootDir: chatapp/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Update this once you know your backend's real Render URL.
      - key: VITE_SERVER_URL
        value: https://chatapp-backend.onrender.com
